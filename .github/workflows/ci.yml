name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          cd task-2
          npm ci

      - name: Run linter
        run: |
          cd task-2
          npm run lint

      - name: Check formatting
        run: |
          cd task-2
          npm run format-check

      - name: Run tests
        run: |
          cd task-2
          npm run test
