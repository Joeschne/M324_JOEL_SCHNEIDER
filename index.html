            }

            25% {

            }

            50% {
                transform: translateY(-30px) rotate(-1deg);
            }

            75% {
                transform: translateY(-15px) rotate(1deg);
            }
        }

        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(3deg);
            }

            }

            animation: sparkleFloat 2s ease-out forwards;

            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: particleExplode 1s ease-out forwards;
        }

        .particle.red { background: #DC143C; }
        .particle.yellow { background: #FFD700; }
        .particle.green { background: #32CD32; }
        .particle.purple { background: #9932CC; }

            0% {
                opacity: 1;
                transform: translateY(0px) scale(0);
            }
            20% {
                opacity: 1;
                transform: translateY(-10px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(0.5);
            }
        }

        @keyframes particleExplode {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.2);
            }
        }

    <script>
        // Mouse sparkle trail
        let mouseX = 0, mouseY = 0;
        let sparkleTimer;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Create sparkle every few mouse moves
            if (Math.random() < 0.3) {
                createSparkle(mouseX, mouseY);
            }
        });

        // Click particle explosion
        document.addEventListener('click', (e) => {
            createParticleExplosion(e.clientX, e.clientY);
        });

        // Make Ferris react to clicks
        document.querySelector('.ferris-container').addEventListener('click', (e) => {
            e.stopPropagation();
            const ferris = document.querySelector('.ferris');
            ferris.style.animation = 'wiggle 0.3s ease-in-out';
            
            // Create extra sparkles around Ferris
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const rect = ferris.getBoundingClientRect();
                    const x = rect.left + Math.random() * rect.width;
                    const y = rect.top + Math.random() * rect.height;
                    createSparkle(x, y);
                }, i * 100);
            }
            
            // Reset animation
            setTimeout(() => {
                ferris.style.animation = 'wiggle 1.5s infinite ease-in-out';
            }, 300);
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = (x - 3) + 'px';
            sparkle.style.top = (y - 3) + 'px';
            document.body.appendChild(sparkle);
            
            // Remove sparkle after animation
            setTimeout(() => {
                if (sparkle.parentNode) {
                    sparkle.parentNode.removeChild(sparkle);
                }
            }, 2000);
        }

        function createParticleExplosion(x, y) {
            const colors = ['orange', 'blue', 'red', 'yellow', 'green', 'purple'];
            const particleCount = 12;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = `particle ${colors[Math.floor(Math.random() * colors.length)]}`;
                
                const angle = (i / particleCount) * Math.PI * 2;
                const distance = 30 + Math.random() * 40;
                const offsetX = Math.cos(angle) * distance;
                const offsetY = Math.sin(angle) * distance;
                
                particle.style.left = (x - 4) + 'px';
                particle.style.top = (y - 4) + 'px';
                particle.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                
                document.body.appendChild(particle);
                
                // Remove particle after animation
                setTimeout(() => {
                    if (particle.parentNode) {
                        particle.parentNode.removeChild(particle);
                    }
                }, 1000);
            }
        }

        // Periodic random sparkles around Ferris
        setInterval(() => {
            if (Math.random() < 0.4) {
                const ferris = document.querySelector('.ferris-container');
                const rect = ferris.getBoundingClientRect();
                const x = rect.left + rect.width/2 + (Math.random() - 0.5) * rect.width * 1.5;
                const y = rect.top + rect.height/2 + (Math.random() - 0.5) * rect.height * 1.5;
                createSparkle(x, y);
            }
        }, 1500);
    </script>
